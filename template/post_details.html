<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flock — Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">
    <style>
        @import "https://cdn.jsdelivr.net/npm/tailwindcss@4/cdn.min.css";

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0c0c0e;
            --surface: #141416;
            --surface2: #1c1c1f;
            --border: #252528;
            --border2: #2e2e32;
            --text: #f0ede8;
            --text2: #9995a0;
            --text3: #5c5966;
            --accent: #c8f058;
            --accent-dim: #c8f05820;
            --accent-text: #0c0c0e;
            --red: #ff5e5e;
            --red-dim: #ff5e5e18;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .serif {
            font-family: 'Instrument Serif', serif;
        }

        ::-webkit-scrollbar {
            width: 0px;
        }

        .layout {
            max-width: 1060px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 220px 1fr 230px;
            min-height: 100vh;
        }

        .sidebar-left {
            border-right: 1px solid var(--border);
            padding: 1.75rem 1rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            overflow-y: auto;
        }

        .brand {
            font-family: 'Instrument Serif', serif;
            font-size: 1.8rem;
            color: var(--accent);
            letter-spacing: -0.02em;
            padding: 0 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .brand-dot {
            width: 9px;
            height: 9px;
            background: var(--accent);
            border-radius: 50%;
            margin-top: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.65rem 0.75rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .nav-item.active {
            color: var(--text);
            background: var(--surface2);
            font-weight: 600;
        }

        .nav-item .badge {
            margin-left: auto;
            background: var(--accent);
            color: var(--accent-text);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.15rem 0.45rem;
            border-radius: 9999px;
        }

        .cta-btn {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: all 0.15s;
            letter-spacing: 0.01em;
        }

        .cta-btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-dim);
        }

        .me-row {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.65rem 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: background 0.15s;
        }

        .me-row:hover {
            background: var(--surface2);
        }

        .avatar {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
            font-size: 0.8rem;
        }

        .main-col {
            border-right: 1px solid var(--border);
            min-height: 100vh;
        }

        .top-bar {
            position: sticky;
            top: 0;
            background: rgba(12, 12, 14, 0.88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.25rem;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .back-btn {
            background: var(--surface2);
            border: none;
            color: var(--text2);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .back-btn:hover {
            background: var(--border2);
            color: var(--text);
        }

        .post-full {
            padding: 1.4rem 1.25rem 0;
            border-bottom: 1px solid var(--border);
            animation: fadeUp 0.3s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-author-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .post-author-info {
            flex: 1;
            min-width: 0;
        }

        .post-author-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .post-author-handle {
            color: var(--text3);
            font-size: 0.82rem;
            margin-top: 0.08rem;
        }

        .post-full-text {
            font-size: 1.15rem;
            line-height: 1.65;
            color: var(--text);
            white-space: pre-line;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        .post-img-full {
            width: 100%;
            border-radius: 14px;
            margin-bottom: 1rem;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            overflow: hidden;
        }

        .post-timestamp {
            font-size: 0.82rem;
            color: var(--text3);
            padding: 0.85rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-stats-row {
            display: flex;
            gap: 1.5rem;
            padding: 0.9rem 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-link {
            font-size: 0.875rem;
            color: var(--text2);
            cursor: pointer;
            transition: color 0.15s;
        }

        .stat-link:hover {
            color: var(--text);
        }

        .stat-link strong {
            color: var(--text);
            font-weight: 700;
        }

        .post-actions-row {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0.5rem 0 0.65rem;
            border-bottom: 1px solid var(--border);
        }

        .act-big {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.85rem;
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text3);
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Instrument Sans', sans-serif;
            font-weight: 500;
            transition: all 0.15s;
        }

        .act-big:hover {
            color: var(--accent);
            background: var(--accent-dim);
        }

        .act-big.liked {
            color: var(--red);
        }

        .act-big.liked:hover {
            background: var(--red-dim);
        }

        .reply-compose {
            display: flex;
            gap: 0.85rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .reply-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 0.92rem;
            color: var(--text);
            resize: none;
            line-height: 1.5;
            padding-top: 0.2rem;
        }

        .reply-input::placeholder {
            color: var(--text3);
        }

        .reply-send-btn {
            align-self: flex-end;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            padding: 0.42rem 1rem;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
        }

        .reply-send-btn:hover {
            opacity: 0.85;
        }

        .replies-header {
            padding: 0.85rem 1.25rem 0.5rem;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .reply-card {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.8rem;
            transition: background 0.12s;
            cursor: pointer;
            animation: fadeUp 0.25s ease both;
        }

        .reply-card:hover {
            background: var(--surface);
        }

        .reply-thread-line {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .thread-dot {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .thread-line {
            width: 1.5px;
            flex: 1;
            background: var(--border2);
            margin-top: 4px;
            min-height: 20px;
        }

        .reply-body {
            flex: 1;
            min-width: 0;
        }

        .reply-meta {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.3rem;
            flex-wrap: wrap;
        }

        .reply-name {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .reply-handle {
            color: var(--text3);
            font-size: 0.8rem;
        }

        .reply-time {
            color: var(--text3);
            font-size: 0.8rem;
        }

        .reply-time::before {
            content: '·';
            margin-right: 0.4rem;
        }

        .reply-text {
            font-size: 0.88rem;
            line-height: 1.55;
            color: var(--text2);
            white-space: pre-line;
            margin-bottom: 0.6rem;
        }

        .reply-acts {
            display: flex;
            gap: 0;
        }

        .ract {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.28rem 0.55rem;
            border-radius: 7px;
            font-size: 0.77rem;
            color: var(--text3);
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Instrument Sans', sans-serif;
            transition: all 0.15s;
        }

        .ract:hover {
            color: var(--accent);
            background: var(--accent-dim);
        }

        .ract.liked {
            color: var(--red);
        }

        .sidebar-right {
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .widget {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem;
        }

        .widget-title {
            font-family: 'Instrument Serif', serif;
            font-size: 1rem;
            margin-bottom: 0.85rem;
            color: var(--text);
        }

        .person-row {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.5rem 0;
        }

        .person-row+.person-row {
            border-top: 1px solid var(--border);
        }

        .follow-btn {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--text);
            border-radius: 8px;
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Instrument Sans', sans-serif;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .follow-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .follow-btn.on {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-text);
        }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.7rem;
            background: var(--surface2);
            border-radius: 8px;
            font-size: 0.78rem;
            color: var(--text2);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin: 0.2rem;
        }

        .tag-pill:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            backdrop-filter: blur(2px);
        }

        .modal-bg.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 18px;
            padding: 1.5rem;
            width: min(500px, 94vw);
            transform: scale(0.96);
            transition: transform 0.2s;
        }

        .modal-bg.open .modal-box {
            transform: scale(1);
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.1rem;
        }

        .close-btn {
            background: var(--surface2);
            border: none;
            color: var(--text2);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .close-btn:hover {
            background: var(--border2);
            color: var(--text);
        }

        .compose-textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            resize: none;
            line-height: 1.5;
        }

        .compose-textarea::placeholder {
            color: var(--text3);
        }

        .post-btn-sm {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            padding: 0.45rem 1.1rem;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .post-btn-sm:hover {
            opacity: 0.85;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            padding: 0.35rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: color 0.15s, background 0.15s;
        }

        .icon-btn:hover {
            color: var(--accent);
            background: var(--accent-dim);
        }

        @media (max-width: 820px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar-left,
            .sidebar-right {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="layout">

        <aside class="sidebar-left">
            <div class="brand">flock <div class="brand-dot"></div>
            </div>

            <button class="nav-item active" onclick="setActive(this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Feed
            </button>

            <button class="nav-item" onclick="openNotifModal(); setActive(this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
                Notifications
                <span class="badge">4</span>
            </button>

            <button class="nav-item" onclick="setActive(this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                Following
            </button>

            <button class="nav-item" onclick="setActive(this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Profile
            </button>

            <button class="nav-item" onclick="setActive(this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
                </svg>
                Saved
            </button>

            <button class="cta-btn" onclick="openComposeModal()">+ New Post</button>

            <div class="me-row">
                <div class="avatar" style="width:36px;height:36px;background:#1e2d14;color:var(--accent);">RA</div>
                <div style="min-width:0;">
                    <div
                        style="font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                        Roland Adams</div>
                    <div style="font-size:0.73rem;color:var(--text3);">@R_coredev</div>
                </div>
            </div>
        </aside>

        <main class="main-col">

            <div class="top-bar">
                <button class="back-btn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <div class="serif" style="font-size:1.1rem;">Post</div>
            </div>

            <div class="post-full" id="post-full"></div>

            <div class="reply-compose">
                <div class="avatar"
                    style="width:36px;height:36px;background:#1e2d14;color:var(--accent);flex-shrink:0;">RA</div>
                <textarea class="reply-input" id="reply-input" rows="2" placeholder="Write your reply…"></textarea>
                <button class="reply-send-btn" onclick="sendReply()">Reply</button>
            </div>

            <div class="replies-header" id="replies-label">REPLIES</div>
            <div id="replies-list"></div>

        </main>

        <aside class="sidebar-right">
            <div style="position:relative;">
                <input type="text" placeholder="Search flock…"
                    style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.55rem 0.9rem 0.55rem 2.35rem;font-family:'Instrument Sans',sans-serif;font-size:0.85rem;color:var(--text);outline:none;transition:border-color 0.15s;"
                    onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
                <svg style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;"
                    width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </div>

            <div class="widget">
                <div class="widget-title">People to follow</div>
                <div id="follow-list"></div>
            </div>

            <div class="widget">
                <div class="widget-title">Topics</div>
                <div style="display:flex;flex-wrap:wrap;margin:-0.2rem;" id="topics"></div>
            </div>
        </aside>
    </div>

    <div class="modal-bg" id="compose-modal">
        <div class="modal-box">
            <div class="modal-head">
                <div class="serif" style="font-size:1.1rem;">New Post</div>
                <button class="close-btn" onclick="closeModal('compose-modal')">✕</button>
            </div>
            <div style="display:flex;gap:0.9rem;">
                <div class="avatar" style="width:40px;height:40px;background:#1e2d14;color:var(--accent);">RA</div>
                <div style="flex:1;">
                    <textarea id="compose-input" rows="4" class="compose-textarea" placeholder="What's happening?"
                        style="font-size:1rem;min-height:110px;"></textarea>
                    <div
                        style="border-top:1px solid var(--border);padding-top:0.75rem;display:flex;align-items:center;justify-content:space-between;margin-top:0.75rem;">
                        <button class="icon-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <polyline points="21 15 16 10 5 21" />
                            </svg>
                        </button>
                        <button class="post-btn-sm" onclick="closeModal('compose-modal')"
                            style="padding:0.5rem 1.4rem;font-size:0.875rem;">Post it</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="notif-modal">
        <div class="modal-box">
            <div class="modal-head">
                <div class="serif" style="font-size:1.1rem;">Notifications</div>
                <button class="close-btn" onclick="closeModal('notif-modal')">✕</button>
            </div>
            <div style="display:flex;flex-direction:column;gap:0.6rem;" id="notif-list"></div>
        </div>
    </div>

    <script>
        const imgColors = [
            { bg: "linear-gradient(135deg,#1a2a1e 0%,#2d4a35 100%)", label: "🌿 nature shot" },
            { bg: "linear-gradient(135deg,#1a1e2e 0%,#2d3560 100%)", label: "🌃 night vibes" },
            { bg: "linear-gradient(135deg,#2e1e2a 0%,#4a2d40 100%)", label: "📸 street photo" },
            { bg: "linear-gradient(135deg,#2a2010 0%,#4a3820 100%)", label: "☕ morning mood" },
            { bg: "linear-gradient(135deg,#1a2020 0%,#253535 100%)", label: "💻 desk setup" },
        ];

        const users = [
            { id: 1, name: "Akintola Steve", handle: "AkintolaDev", initials: "AS", bg: "#1a1e2e", fg: "#7eb8f7" },
            { id: 2, name: "Chiamaka Obi", handle: "chiamaka_obi", initials: "CO", bg: "#2a1a2e", fg: "#d07ef7" },
            { id: 3, name: "Tunde Builds", handle: "TundeBuilds", initials: "TB", bg: "#1e2a1a", fg: "#7ef7a4" },
            { id: 4, name: "Kemi Lagos", handle: "kemi_lagos", initials: "KL", bg: "#2e1e1a", fg: "#f79e7e" },
            { id: 5, name: "Dev Diary", handle: "devdiary_ng", initials: "DD", bg: "#1a2a2a", fg: "#7ef0f7" },
        ];

        const post = {
            id: 1,
            user: { name: "Akintola Steve", handle: "AkintolaDev", initials: "AS", bg: "#1a1e2e", fg: "#7eb8f7" },
            time: "May 26, 2026",
            fullTime: "9:42 AM · May 26, 2026",
            text: "System design is a skill that compounds.\n\nThe more you practice thinking in systems, the easier it becomes to see why architecture decisions get made — and how to make better ones yourself.\n\nMost people jump into \"design Uber\" or \"design WhatsApp\" too early without understanding the foundations first.\n\nStart with: queues, caches, databases, load balancers. Understand those deeply before anything else.",
            likes: 1346,
            reposts: 251,
            comments: 88,
            views: 42000,
            liked: false,
            reposted: false,
            hasImg: false,
        };

        let replies = [
            { id: 101, user: users[2], time: "3h", text: "This is exactly what I needed to read today. Been trying to design distributed systems without knowing the primitives. Going back to basics this week.", likes: 94, liked: false, animation: 0 },
            { id: 102, user: users[1], time: "4h", text: "Queues alone took me a month to really understand. Worth every hour though — everything clicked once I got there.", likes: 62, liked: false, animation: 1 },
            { id: 103, user: users[4], time: "5h", text: "The foundations point is so real. I wasted months trying to design complex systems before I even understood how a single DB index worked 😅", likes: 131, liked: false, animation: 2 },
            { id: 104, user: users[3], time: "6h", text: "Bookmarking this. Sharing with my team tomorrow morning.", likes: 47, liked: false, animation: 3 },
            { id: 105, user: users[0], time: "8h", text: "Caches are the one that still trips me up. So many ways to invalidate, each with tradeoffs. Any resources you'd recommend?", likes: 28, liked: false, animation: 4 },
        ];

        let nextReplyId = 200;
        const following = new Set([1, 3]);

        const topics = ["#LagosTech", "#BuildInPublic", "#SystemDesign", "#OpenSource", "#Startups", "#UIDesign", "#RemoteWork", "#JavaScript"];
        const notifs = [
            { icon: "❤️", html: "<strong>Akintola Dev</strong> liked your post", time: "3m" },
            { icon: "🔁", html: "<strong>Kemi Lagos</strong> reposted your thread", time: "21m" },
            { icon: "👤", html: "<strong>Dev Diary NG</strong> followed you", time: "1h" },
            { icon: "💬", html: "<strong>Chiamaka Obi</strong> replied: \"This is facts 🔥\"", time: "2h" },
        ];

        function fmt(n) {
            if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + "K";
            return n;
        }

        function renderPost() {
            const imgHtml = post.hasImg
                ? `<div class="post-img-full" style="background:${imgColors[0].bg};"><span>${imgColors[0].label}</span></div>`
                : '';

            document.getElementById('post-full').innerHTML = `
    <div class="post-author-row">
      <div class="avatar" style="width:44px;height:44px;background:${post.user.bg};color:${post.user.fg};font-size:0.9rem;">${post.user.initials}</div>
      <div class="post-author-info">
        <div class="post-author-name">${post.user.name}</div>
        <div class="post-author-handle">@${post.user.handle}</div>
      </div>
      <button style="margin-left:auto;background:var(--accent);color:var(--accent-text);border:none;border-radius:9px;padding:0.42rem 1.1rem;font-family:'Instrument Sans',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;transition:opacity 0.15s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">Follow</button>
    </div>

    <div class="post-full-text">${post.text}</div>
    ${imgHtml}

    <div class="post-timestamp">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ${post.fullTime}
    </div>

    <div class="post-stats-row">
      <div class="stat-link" onclick="showReposts()"><strong>${fmt(post.reposts)}</strong> Reposts</div>
      <div class="stat-link"><strong>${fmt(post.likes)}</strong> Likes</div>
      <div class="stat-link"><strong>${fmt(post.views)}</strong> Views</div>
      <div class="stat-link"><strong>${fmt(post.comments)}</strong> Replies</div>
    </div>

    <div class="post-actions-row">
      <button class="act-big" onclick="toggleReply()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Reply
      </button>
      <button class="act-big ${post.reposted ? 'liked' : ''}" onclick="toggleRepost()" id="repost-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        ${post.reposted ? 'Reposted' : 'Repost'}
      </button>
      <button class="act-big ${post.liked ? 'liked' : ''}" onclick="toggleLike()" id="like-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${post.liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ${post.liked ? 'Liked' : 'Like'}
      </button>
      <button class="act-big" onclick="copyLink()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
    </div>
  `;
        }

        function renderReplies() {
            const label = document.getElementById('replies-label');
            label.textContent = `${replies.length} ${replies.length === 1 ? 'REPLY' : 'REPLIES'}`;

            document.getElementById('replies-list').innerHTML = replies.map((r, i) => {
                const isLast = i === replies.length - 1;
                return `<div class="reply-card" style="animation-delay:${i * 0.05}s">
      <div class="reply-thread-line">
        <div class="thread-dot avatar" style="background:${r.user.bg};color:${r.user.fg};">${r.user.initials}</div>
        ${!isLast ? '<div class="thread-line"></div>' : ''}
      </div>
      <div class="reply-body">
        <div class="reply-meta">
          <span class="reply-name">${r.user.name}</span>
          <span class="reply-handle">@${r.user.handle}</span>
          <span class="reply-time">${r.time}</span>
        </div>
        <div class="reply-text">${r.text}</div>
        <div class="reply-acts">
          <button class="ract ${r.liked ? 'liked' : ''}" onclick="toggleReplyLike(${r.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="${r.liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            ${fmt(r.likes)}
          </button>
          <button class="ract">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Reply
          </button>
          <button class="ract">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            ${fmt(Math.floor(r.likes / 3))}
          </button>
        </div>
      </div>
    </div>`;
            }).join('');
        }

        function toggleLike() {
            post.liked = !post.liked;
            post.likes += post.liked ? 1 : -1;
            renderPost();
        }

        function toggleRepost() {
            post.reposted = !post.reposted;
            post.reposts += post.reposted ? 1 : -1;
            renderPost();
        }

        function toggleReplyLike(id) {
            const r = replies.find(r => r.id === id);
            if (!r) return;
            r.liked = !r.liked;
            r.likes += r.liked ? 1 : -1;
            renderReplies();
        }

        function toggleReply() {
            const input = document.getElementById('reply-input');
            input.focus();
            input.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function sendReply() {
            const text = document.getElementById('reply-input').value.trim();
            if (!text) return;
            const me = { id: 0, name: "Roland Adams", handle: "R_coredev", initials: "RA", bg: "#1e2d14", fg: "var(--accent)" };
            replies.unshift({ id: nextReplyId++, user: me, time: "now", text, likes: 0, liked: false });
            post.comments += 1;
            document.getElementById('reply-input').value = '';
            renderPost();
            renderReplies();
        }

        function copyLink() {
            const btn = event.currentTarget;
            const orig = btn.innerHTML;
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
            btn.style.color = 'var(--accent)';
            setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 1800);
        }

        function renderFollowList() {
            const suggestions = users.filter(u => !following.has(u.id)).slice(0, 3);
            document.getElementById('follow-list').innerHTML = suggestions.map(u => `
    <div class="person-row">
      <div class="avatar" style="width:34px;height:34px;background:${u.bg};color:${u.fg};">${u.initials}</div>
      <div style="min-width:0;flex:1;">
        <div style="font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${u.name}</div>
        <div style="font-size:0.73rem;color:var(--text3);">@${u.handle}</div>
      </div>
      <button class="follow-btn ${following.has(u.id) ? 'on' : ''}" onclick="toggleFollow(${u.id}, this)">${following.has(u.id) ? 'Following' : 'Follow'}</button>
    </div>`).join('');
        }

        function renderTopics() {
            document.getElementById('topics').innerHTML = topics.map(t => `<span class="tag-pill">${t}</span>`).join('');
        }

        function renderNotifs() {
            document.getElementById('notif-list').innerHTML = notifs.map(n => `
    <div style="display:flex;align-items:flex-start;gap:0.75rem;padding:0.65rem;border-radius:10px;background:var(--surface2);">
      <span style="font-size:1.1rem;flex-shrink:0;">${n.icon}</span>
      <div style="flex:1;">
        <div style="font-size:0.875rem;line-height:1.4;">${n.html}</div>
        <div style="font-size:0.75rem;color:var(--text3);margin-top:0.2rem;">${n.time} ago</div>
      </div>
    </div>`).join('');
        }

        function toggleFollow(id, btn) {
            if (following.has(id)) { following.delete(id); btn.textContent = 'Follow'; btn.classList.remove('on'); }
            else { following.add(id); btn.textContent = 'Following'; btn.classList.add('on'); }
            renderFollowList();
        }

        function openComposeModal() {
            document.getElementById('compose-modal').classList.add('open');
            setTimeout(() => document.getElementById('compose-input').focus(), 200);
        }

        function openNotifModal() {
            renderNotifs();
            document.getElementById('notif-modal').classList.add('open');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        document.querySelectorAll('.modal-bg').forEach(bg => {
            bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); });
        });

        renderPost();
        renderReplies();
        renderFollowList();
        renderTopics();
    </script>
</body>

</html>
